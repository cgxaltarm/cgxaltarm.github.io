    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('search');
    const totalEl = document.getElementById('total');
    const shownEl = document.getElementById('shown');
    let currentFilter = 'all';

    function getTypeLabel(type) {
      const map = { api: 'Free API', china: 'China', credit: 'Agregator', trial: 'Free Trial', startup: 'Startup', cloud: 'Cloud', speech: 'Speech', image: 'Image/Video' };
      return map[type] || type;
    }
    function getTypeClass(type) { return `type-${type}`; }

    function render(list) {
      totalEl.textContent = data.length;
      shownEl.textContent = list.length;
      if (list.length === 0) {
        grid.innerHTML = `<div class="empty"><p style="font-size:1.15rem;margin-bottom:6px;">Tidak ada hasil</p><p>Coba kata kunci atau filter lain</p></div>`;
        return;
      }
      grid.innerHTML = list.map(item => `
        <article class="card">
          <div class="card-header">
            <h2 class="card-title">${item.name}</h2>
            <span class="type-badge ${getTypeClass(item.type)}">${getTypeLabel(item.type)}</span>
          </div>
          <div class="credit-amount">${item.amount}</div>
          <p class="card-desc">${item.desc}</p>
          <div class="steps">
            <strong>Cara Klaim</strong>
            <ol>${item.steps.map(s => `<li>${s}</li>`).join('')}</ol>
          </div>
          <div class="card-footer">
            <a href="${item.claimUrl}" target="_blank" rel="noopener" class="btn btn-primary">Klaim Sekarang</a>
            <a href="${item.docsUrl}" target="_blank" rel="noopener" class="btn btn-secondary">Docs</a>
          </div>
        </article>
      `).join('');
    }

    function apply() {
      const q = searchInput.value.trim().toLowerCase();
      let result = data;
      if (currentFilter !== 'all') result = result.filter(item => item.type === currentFilter);
      if (q) result = result.filter(item => (`${item.name} ${item.desc} ${item.amount} ${item.type}`).toLowerCase().includes(q));
      render(result);
    }

    searchInput.addEventListener('input', apply);
    document.getElementById('filters').addEventListener('click', (e) => {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentFilter = e.target.dataset.filter;
      apply();
    });

    render(data);
  </script>
